apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: taskflow-api
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Srujankodi/production-gitops-platform.git
    targetRevision: main
    path: k8s/base

  destination:
    server: https://kubernetes.default.svc
    namespace: taskflow

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
