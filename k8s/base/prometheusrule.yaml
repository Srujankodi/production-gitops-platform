apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: taskflow-alerts
  namespace: taskflow
  labels:
    release: monitoring
spec:
  groups:
    - name: taskflow.rules
      rules:
        - alert: TaskFlowDown
          expr: kube_deployment_status_replicas_available{namespace="taskflow",deployment="taskflow-api"} < 1
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "TaskFlow API is down"
            description: "A TaskFlow API target has been unavailable for more than 1 minute."

        - alert: TaskFlowHighErrorRate
          expr: |
            (
              sum(rate(taskflow_http_requests_total{status_code=~"5.."}[5m]))
              /
              clamp_min(sum(rate(taskflow_http_requests_total[5m])), 0.001)
            ) > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "TaskFlow API high error rate"
            description: "More than 5% of TaskFlow requests are returning 5xx responses."

        - alert: TaskFlowHighLatency
          expr: |
            histogram_quantile(
              0.95,
              sum(rate(taskflow_http_request_duration_seconds_bucket[5m])) by (le)
            ) > 0.5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "TaskFlow API high latency"
            description: "The 95th percentile request latency is above 500 ms."
